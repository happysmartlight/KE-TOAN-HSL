name: Test install.bat

on:
  push:
    branches: [master, main]
    paths:
      - 'install.bat'
      - 'backend/package*.json'
      - 'frontend/package*.json'
      - 'backend/prisma/schema.prisma'
      - '.github/workflows/test-install-bat.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'install.bat'
      - '.github/workflows/test-install-bat.yml'
  workflow_dispatch:

jobs:
  test-install-bat:
    name: install.bat — Windows
    runs-on: windows-latest

    env:
      # Các giá trị này sẽ được feed vào install.bat qua stdin redirect
      CI_DB_NAME: ke_toan_ci
      CI_DB_USER: ketoan_ci
      CI_DB_PASS: CiTestPass123
      CI_MYSQL_ROOT_PASS: rootpass
      CI_ADMIN_PASS: CiAdminPass@123456

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MariaDB via Chocolatey
        shell: powershell
        run: |
          choco install mariadb -y --no-progress
          # Đợi service start
          Start-Sleep -Seconds 5
          $svc = Get-Service -Name 'MariaDB' -ErrorAction SilentlyContinue
          if (-not $svc) { Write-Error "MariaDB service không tồn tại"; exit 1 }
          if ($svc.Status -ne 'Running') { Start-Service MariaDB }
          Write-Host "MariaDB service status: $((Get-Service MariaDB).Status)"

      - name: Add MariaDB bin to PATH
        shell: powershell
        run: |
          $bin = Get-ChildItem 'C:\Program Files\MariaDB *\bin' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $bin) { Write-Error "Không tìm thấy MariaDB bin folder"; exit 1 }
          Add-Content $env:GITHUB_PATH $bin.FullName
          Write-Host "Added to PATH: $($bin.FullName)"

      - name: Verify mysql client and set root password
        shell: cmd
        run: |
          mysql --version
          mysql -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '%CI_MYSQL_ROOT_PASS%'; FLUSH PRIVILEGES;"
          mysql -u root -p%CI_MYSQL_ROOT_PASS% -e "SELECT VERSION();"

      - name: Prepare stdin input file for install.bat
        shell: cmd
        run: |
          REM Theo thứ tự prompt trong install.bat (fresh install, no existing .env):
          REM   1. Ten database
          REM   2. Ten user
          REM   3. Mat khau user
          REM   4. Mat khau root MariaDB
          REM   5. Mat khau admin
          (
            echo %CI_DB_NAME%
            echo %CI_DB_USER%
            echo %CI_DB_PASS%
            echo %CI_MYSQL_ROOT_PASS%
            echo %CI_ADMIN_PASS%
            echo.
            echo.
          ) > install_input.txt
          type install_input.txt

      - name: Run install.bat with redirected stdin
        shell: cmd
        run: |
          install.bat < install_input.txt
          if errorlevel 1 (
            echo ::error::install.bat failed with exit code %errorlevel%
            exit /b 1
          )

      - name: Verify backend\.env created
        shell: powershell
        run: |
          if (-not (Test-Path "backend\.env")) {
            Write-Error "backend\.env không tồn tại"
            exit 1
          }
          $content = Get-Content "backend\.env" -Raw
          if ($content -notmatch "DATABASE_URL=") { Write-Error "Thiếu DATABASE_URL"; exit 1 }
          if ($content -notmatch "JWT_SECRET=") { Write-Error "Thiếu JWT_SECRET"; exit 1 }
          if ($content -notmatch "INITIAL_ADMIN_PASSWORD=") { Write-Error "Thiếu INITIAL_ADMIN_PASSWORD"; exit 1 }
          # Kiểm tra JWT_SECRET độ dài >=32
          $jwt = (Select-String -Path "backend\.env" -Pattern '^JWT_SECRET="?([^"]+)"?$').Matches[0].Groups[1].Value
          if ($jwt.Length -lt 32) {
            Write-Error "JWT_SECRET quá ngắn ($($jwt.Length) ký tự)"
            exit 1
          }
          Write-Host "✓ backend\.env hợp lệ (JWT length=$($jwt.Length))"

      - name: Verify backend node_modules installed
        shell: powershell
        run: |
          if (-not (Test-Path "backend\node_modules\@prisma\client")) {
            Write-Error "Prisma client chưa được cài"
            exit 1
          }
          Write-Host "✓ backend dependencies OK"

      - name: Verify frontend node_modules installed
        shell: powershell
        run: |
          if (-not (Test-Path "frontend\node_modules\react")) {
            Write-Error "React chưa được cài"
            exit 1
          }
          Write-Host "✓ frontend dependencies OK"

      - name: Verify database tables created
        shell: cmd
        run: |
          for /f %%c in ('mysql -u root -p%CI_MYSQL_ROOT_PASS% -N -B -e "USE %CI_DB_NAME%; SHOW TABLES;" ^| find /c /v ""') do set "TBL=%%c"
          echo Tables count: %TBL%
          if %TBL% LSS 5 (
            echo ::error::Database chỉ có %TBL% bảng (mong đợi ^>=5)
            exit /b 1
          )
          echo ✓ Database co %TBL% bang

      - name: Smoke test backend dev server
        shell: powershell
        run: |
          # Khởi động backend ngắn để verify nó start được
          $proc = Start-Process -FilePath "cmd" -ArgumentList "/c npm run dev" -WorkingDirectory "backend" -PassThru -RedirectStandardOutput "backend-out.log" -RedirectStandardError "backend-err.log"
          Start-Sleep -Seconds 15
          try {
            $resp = Invoke-WebRequest -Uri "http://localhost:3001/api/health" -UseBasicParsing -TimeoutSec 5
            if ($resp.StatusCode -ne 200) {
              Write-Error "/api/health trả status $($resp.StatusCode)"
              Get-Content backend-out.log
              Get-Content backend-err.log
              exit 1
            }
            Write-Host "✓ /api/health responded with 200"

            # Test login
            $body = @{ username = "admin"; password = $env:CI_ADMIN_PASS } | ConvertTo-Json
            $login = Invoke-WebRequest -Uri "http://localhost:3001/api/auth/login" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 5
            if ($login.Content -notmatch "token") {
              Write-Error "Login không trả token"
              Write-Host $login.Content
              exit 1
            }
            Write-Host "✓ Login admin thành công"
          } catch {
            Write-Host "Backend stdout:"
            Get-Content backend-out.log -ErrorAction SilentlyContinue
            Write-Host "Backend stderr:"
            Get-Content backend-err.log -ErrorAction SilentlyContinue
            throw
          } finally {
            # Kill backend dev server (bao gồm child processes)
            taskkill /F /T /PID $proc.Id 2>$null
            Get-Process node -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }
