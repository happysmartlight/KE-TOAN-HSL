name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: type-check + build ──────────────────────────────────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/ke_toan_build"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Backend: unit tests (no DB, mocked Prisma) ───────────────────────────────
  backend-unit-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    needs: backend-build

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/ke_toan_build"

      - name: Run unit tests
        run: npm run test:unit -- --ci
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/ke_toan_build"
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  # ── Backend: system tests (MariaDB + supertest) ──────────────────────────────
  backend-system-tests:
    name: Backend — System Tests
    runs-on: ubuntu-latest
    needs: backend-build

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ke_toan_test
          MARIADB_USER: ketoan
          MARIADB_PASSWORD: ketoantest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://ketoan:ketoantest@localhost:3306/ke_toan_test"

      - name: Run system tests
        run: npm run test:system -- --ci --runInBand
        env:
          DATABASE_URL: "mysql://ketoan:ketoantest@localhost:3306/ke_toan_test"
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  # ── Frontend: type-check + build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Frontend: unit tests (Vitest + jsdom) ────────────────────────────────────
  frontend-unit-tests:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
