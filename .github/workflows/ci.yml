name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: type-check + build ──────────────────────────────────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Backend: unit tests (no DB, mocked Prisma) ───────────────────────────────
  backend-unit-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    needs: backend-build

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Run unit tests
        run: npm run test:unit -- --ci
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  # ── Backend: system tests (real SQLite test DB + supertest) ──────────────────
  backend-system-tests:
    name: Backend — System Tests
    runs-on: ubuntu-latest
    needs: backend-build

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./prisma/test.db"

      - name: Run system tests
        run: npm run test:system -- --ci --runInBand
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  # ── Frontend: type-check + build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Frontend: unit tests (Vitest + jsdom) ────────────────────────────────────
  frontend-unit-tests:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
